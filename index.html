<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESA Atlas - European Space Network</title>
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin=""/>
    <link rel="stylesheet" href="style.css">
    <!-- Google Fonts for modern typography -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div id="appShell">
        <header>
            <div class="logo">
                <img src="https://upload.wikimedia.org/wikipedia/commons/8/82/European_Space_Agency_logo.svg" alt="ESA Logo" class="esa-logo">
                <h1>ESA Atlas</h1>
            </div>
            <p class="subtitle">Real-time Map of the European Space Network HQ</p>
        </header>
        <main>
            <section id="map-container">
                <div id="map"></div>
                <div class="overlay-glass">
                    <h2>Mission Control Map</h2>
                    <p>Live coordinates of all 22 ESA member states.</p>
                </div>
            </section>
            
            <section id="data-container">
                <div class="table-wrapper glass-panel">
                    <table id="agencies-table">
                        <thead>
                            <tr>
                                <th>Agency</th>
                                <th>Country</th>
                                <th>City</th>
                                <th>Address</th>
                                <th>Coordinates (Lat, Lng)</th>
                            </tr>
                        </thead>
                        <tbody>
                            <!-- Populated by JS -->
                        </tbody>
                    </table>
                </div>
            </section>
        </main>
        <footer>
            <p>Designed for Round 2: Orbital Ops | Built with AI</p>
        </footer>
    </div>
    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
    <script src="script.js"></script>
</body>
</html>
